AWSTemplateFormatVersion: "2010-09-09"
Description: "Cognito User Pool for receipt system"

Parameters:
  Owner:
    Type: String
    Default: w

  Project:
    Type: String
    Default: rs

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  CallbackUrl:
    Type: String
    Default: "http://localhost:5173/callback"
    Description: "Frontend URL that receives the auth code after login"

  LogoutUrl:
    Type: String
    Default: "http://localhost:5173"
    Description: "Frontend URL to redirect to after logout"

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

    Properties:
      UserPoolName: !Sub "${Owner}-${Project}-${Environment}-userpool"

      UsernameAttributes:
        - email

      AutoVerifiedAttributes:
        - email
      EmailVerificationSubject: "Your receipt system verification code"
      EmailVerificationMessage: "Your verification code is {####}"

      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7

      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA

      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

      UserPoolAddOns:
        AdvancedSecurityMode: "OFF"

      UserPoolTags:
        owner: !Ref Owner
        project: !Ref Project
        env: !Ref Environment
        service: cognito
        purpose: auth

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${Owner}-${Project}-${Environment}-app-client"
      UserPoolId: !Ref UserPool

      GenerateSecret: false

      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true

      AllowedOAuthScopes:
        - openid
        - email
        - profile

      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - !Ref LogoutUrl

      AccessTokenValidity: 1 # hours
      IdTokenValidity: 1 # hours
      RefreshTokenValidity: 30 # days
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

      PreventUserExistenceErrors: ENABLED

      SupportedIdentityProviders:
        - COGNITO

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${Owner}-${Project}-${Environment}-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-cognito-userpool-id"

  UserPoolArn:
    Description: "Cognito User Pool ARN — used by API Gateway authorizer"
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-cognito-userpool-arn"

  UserPoolClientId:
    Description: "App client ID — used by the frontend Amplify config"
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-cognito-client-id"

  HostedUiUrl:
    Description: "Cognito Hosted UI login URL"
    Value: !Sub "https://${Owner}-${Project}-${Environment}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-cognito-hosted-ui-url"
