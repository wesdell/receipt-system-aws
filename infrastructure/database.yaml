AWSTemplateFormatVersion: "2010-09-09"
Description: "DynamoDB table for structured receipt data"

Parameters:
  Owner:
    Type: String
    Default: w
    Description: Owner prefix

  Project:
    Type: String
    Default: rs
    Description: Project prefix

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  ReceiptsTable:
    Type: AWS::DynamoDB::Table

    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

    Properties:
      TableName: !Sub "${Owner}-${Project}-${Environment}-dynamo-receipts"

      BillingMode: PAY_PER_REQUEST

      SSESpecification:
        SSEEnabled: true

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S

        - AttributeName: receiptId
          AttributeType: S

        - AttributeName: date
          AttributeType: S

        - AttributeName: categoryDate
          AttributeType: S

      KeySchema:
        - AttributeName: userId
          KeyType: HASH

        - AttributeName: receiptId
          KeyType: RANGE

      GlobalSecondaryIndexes:
        - IndexName: GSI-userId-date

          KeySchema:
            - AttributeName: userId
              KeyType: HASH

            - AttributeName: date
              KeyType: RANGE

          Projection:
            ProjectionType: ALL

        - IndexName: GSI-userId-categoryDate

          KeySchema:
            - AttributeName: userId
              KeyType: HASH

            - AttributeName: categoryDate
              KeyType: RANGE

          Projection:
            ProjectionType: ALL

      Tags:
        - Key: owner
          Value: !Ref Owner

        - Key: project
          Value: !Ref Project

        - Key: env
          Value: !Ref Environment

        - Key: service
          Value: dynamodb

        - Key: purpose
          Value: receipts-storage

Outputs:
  TableName:
    Description: "Name of the DynamoDB receipts table"
    Value: !Ref ReceiptsTable
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-dynamo-receipts-name"

  TableArn:
    Description: "ARN of the DynamoDB receipts table"
    Value: !GetAtt ReceiptsTable.Arn
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-dynamo-receipts-arn"

  DateIndexName:
    Description: "GSI name for querying receipts by date range"
    Value: GSI-userId-date
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-dynamo-index-date"

  CategoryDateIndexName:
    Description: "GSI name for querying receipts by category and date"
    Value: GSI-userId-categoryDate
    Export:
      Name: !Sub "${Owner}-${Project}-${Environment}-dynamo-index-categorydate"
